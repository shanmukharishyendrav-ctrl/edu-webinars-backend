# Server Configuration
server.port=8080

# Application Name
spring.application.name=edu-webinars-backend

# Database Configuration - MySQL
# Change these values to match your MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/edu_webinars?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.springframework=INFO
logging.level.com.eduwebinars=DEBUG
logging.level.org.hibernate.SQL=DEBUG
